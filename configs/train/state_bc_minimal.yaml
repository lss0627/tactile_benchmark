# Minimal real StateBC training slice on mock HDF5 data.
# The training loop is real supervised MSE optimization, but the dataset is
# still generated by the mock/stub runtime and is not suitable for paper claims.

dataset_path: "outputs/mock_dataset/mock_v0.hdf5"
policy_name: "state_bc"
batch_size: 8
num_epochs: 2
seed: 0
learning_rate: 1e-3
output_dir: "outputs/train_state_bc_minimal"
device: "cpu"
dry_run: false
