# Offline evaluation config for the 3-episode PressButton runtime-smoke dataset.
# This does not start Isaac Sim and is not a benchmark or paper-results config.

dataset: "outputs/press_button_runtime_dataset_smoke/press_button_runtime_smoke_gpu1.hdf5"
policy: "replay"
max_episodes: 3
output_dir: "outputs/press_button_runtime_dataset_eval/gpu1_replay_eval"
dataset_kind: "runtime_smoke"
backend: "isaacsim_press_button"
task_name: "PressButton"
benchmark_result: false
not_for_paper_claims: true
